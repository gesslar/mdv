name: Build

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  Quality:
    uses: gesslar/Maint/.github/workflows/Quality.yaml@main
    secrets: inherit
    with:
      package_manager: auto
      perform_linting: "${{ vars.PERFORM_LINTING || 'yes' }}"
      perform_testing: "${{ vars.PERFORM_TESTING || 'yes' }}"

  Build:
    if: github.event.pull_request.merged == true
    needs: Quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpmrebuild

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup linuxdeploy
        run: bash scripts/setup-linuxdeploy.sh

      - name: Build with Tauri
        run: NO_STRIP=true npx tauri build --bundles rpm

      - name: Fix RPM (vendor, desktop file, mimeapps)
        run: bash fix-rpm.sh

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: src-tauri/target/release/bundle/rpm/*.rpm
          generate_release_notes: true

  Publish-RPM:
    needs: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      REMOTE_USER: ${{ secrets.REMOTE_USER }}
      REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
      REMOTE_DIR: rpm.gesslar.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y createrepo-c

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.REMOTE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Download RPM from release
        run: |
          gh release download "v${{ needs.Build.outputs.version }}" \
            --pattern "*.rpm" \
            --dir ./new-rpm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Download existing RPMs from remote
        run: |
          mkdir -p repo/rpm/x86_64
          sftp -i ~/.ssh/deploy_key -b - "${REMOTE_USER}@${REMOTE_HOST}" <<SFTP_EOF || true
          lcd repo/rpm/x86_64
          cd ${REMOTE_DIR}/rpm/x86_64
          mget *.rpm
          SFTP_EOF

      - name: Configure RPM signing
        run: |
          echo "%_gpg_name $(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')" > ~/.rpmmacros

      - name: Sign RPM
        run: |
          rpmsign --addsign new-rpm/*.rpm \
            --define "_gpg_sign_cmd_extra_args --pinentry-mode loopback --passphrase ${{ secrets.GPG_PASSPHRASE }}"

      - name: Add new RPM and regenerate metadata
        run: |
          cp new-rpm/*.rpm repo/rpm/x86_64/
          rm -rf repo/rpm/x86_64/repodata
          createrepo_c repo/rpm/x86_64

      - name: Sign repodata
        run: |
          gpg \
            --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --detach-sign \
            --armor repo/rpm/x86_64/repodata/repomd.xml

      - name: Upload RPM and repodata to remote
        run: |
          sftp -i ~/.ssh/deploy_key -b - "${REMOTE_USER}@${REMOTE_HOST}" <<SFTP_EOF
          cd ${REMOTE_DIR}/rpm/x86_64
          put new-rpm/*.rpm
          rm repodata/*
          put repo/rpm/x86_64/repodata/* repodata/
          SFTP_EOF
